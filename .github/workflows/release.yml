name: Build and Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  check-version:
    name: Check Version Bump
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      changelog: ${{ steps.check.outputs.changelog }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version change
        id: check
        run: |
          # Get current version
          version=$(grep '^version:' vibez/pubspec.yaml | sed -E 's/version:[[:space:]]*//' | tr -d '\r\n')
          echo "Current version: '$version'"
          
          # Get previous version
          if git show HEAD~1:vibez/pubspec.yaml >/dev/null 2>&1; then
            prev_version=$(git show HEAD~1:vibez/pubspec.yaml | grep '^version:' | sed -E 's/version:[[:space:]]*//' | tr -d '\r\n')
            echo "Previous version: '$prev_version'"
          else
            prev_version=""
            echo "No previous commit found."
          fi
          
          if [ "$version" = "$prev_version" ]; then
            echo "No version bump detected. Skipping build."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Version bumped from '$prev_version' to '$version'."
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$version" >> $GITHUB_OUTPUT

            # Generate changelog from git commits in this push
            if git show HEAD~1 >/dev/null 2>&1; then
              log=$(git log --format="* %s (%h)" HEAD~1..HEAD)
            else
              log="* Initial release build"
            fi
            
            # Write multiline changelog to output
            EOF=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
            echo "changelog<<$EOF" >> $GITHUB_OUTPUT
            echo "$log" >> $GITHUB_OUTPUT
            echo "$EOF" >> $GITHUB_OUTPUT
          fi

  build-and-release:
    name: Build APK and Publish Release
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create .env file
        run: |
          if [ -n "${{ secrets.ENV_FILE }}" ]; then
            echo "${{ secrets.ENV_FILE }}" > vibez/.env
          else
            echo "ENVIRONMENT=production" > vibez/.env
            echo "API_URL=https://vibez-backend-1esn.onrender.com" >> vibez/.env
          fi

      - name: Install Dependencies
        run: flutter pub get
        working-directory: vibez

      - name: Build APK
        run: flutter build apk --release
        working-directory: vibez

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: "Release v${{ needs.check-version.outputs.version }}"
          body: |
            Release build for version ${{ needs.check-version.outputs.version }}.

            ### Changelog:
            ${{ needs.check-version.outputs.changelog }}

            **Commit:** ${{ github.sha }}
            **Timestamp:** ${{ github.event.head_commit.timestamp }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: vibez/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
