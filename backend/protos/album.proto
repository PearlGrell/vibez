syntax = "proto3";
package album;

service Album {
    rpc Album(AlbumRequest) returns (AlbumResponse);
}

message AlbumRequest {
    string id = 1;
}

message AlbumArtist {
    string id = 2;
    string name = 1;
}

message AlbumTrack {
    string videoId = 1;
    string title = 2;
    repeated AlbumArtist artists = 3;
    string album = 4;
    int32 durationSeconds = 5;
    string thumbnail = 6;
    bool isExplicit = 7;
    int32 trackNumber = 8;
}

message AlbumVersion {
    string id = 1;
    string title = 2;
    repeated AlbumArtist artists = 3;
    string thumbnail = 4;
    bool isExplicit = 5;
    string type = 6;
}

message RelatedAlbum {
    string id = 1;
    string title = 2;
    repeated AlbumArtist artists = 3;
    string thumbnail = 4;
    bool isExplicit = 5;
    string type = 6;
}

message AlbumResponse {
    string id = 1;
    string title = 2;
    string type = 3;
    string thumbnail = 4;
    bool isExplicit = 5;
    string description = 6;
    string year = 7;
    repeated AlbumArtist artists = 8;
    int32 trackCount = 9;
    int32 durationSeconds = 10;
    repeated AlbumTrack tracks = 11;
    repeated AlbumVersion otherVersions = 12;
    repeated RelatedAlbum relatedAlbums = 13;
}
